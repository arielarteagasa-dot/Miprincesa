<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita Preciosa ❤️</title>

<style>
:root {
    --pink:#ff99cc;
    --purple:#d57eeb;
    --gold:#fccb90;
    --love:#ff6b81;
}

body,html{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050505;
    color:white;
    font-family:sans-serif;
}

/* FONDO */
#nebula{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center,#1b2735,#090a0f);
    animation:move 15s infinite;
    z-index:-2;
}

@keyframes move{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* ESTRELLAS */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:0.7;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* UI */
#ui{
    position:absolute;
    top:5%;
    width:100%;
    text-align:center;
}

h1{
    font-size:2.5rem;
    color:var(--gold);
}

/* FRASES */
.trail{
    position:absolute;
    font-size:1.2rem;
    font-weight:bold;
    animation:fade 2.5s forwards;
}

@keyframes fade{
    to{
        transform:translateY(-80px);
        opacity:0;
    }
}

/* OBJETOS */
.obj{
    position:absolute;
    font-size:3rem;
    cursor:pointer;
    transition:0.3s;
}

.obj:hover{
    transform:scale(1.4) rotate(10deg);
}

/* BOTON FINAL */
#final{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px;
    border:none;
    border-radius:30px;
    background:var(--gold);
    font-size:1.5rem;
    cursor:pointer;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    max-width:300px;
    text-align:center;
}
</style>
</head>

<body onmousemove="trail(event)">

<div id="nebula"></div>

<div id="ui">
    <h1>Nuestra Galaxia 💖</h1>
    <p>Toca todos los objetos ✨</p>
</div>

<!-- OBJETOS -->
<div class="obj" style="top:30%;left:20%" onclick="openModal('💖 Eres mi todo')">💖</div>
<div class="obj" style="top:60%;left:30%" onclick="openModal('✨ Mi lugar favorito eres tú')">🌟</div>
<div class="obj" style="top:40%;left:70%" onclick="openModal('🎁 Te daría todo')">🎁</div>
<div class="obj" style="top:70%;left:75%" onclick="openModal('📜 Nuestro recuerdo')">📜</div>
<div class="obj" style="top:15%;left:60%" onclick="openModal('💎 Mi tesoro eres tú')">💎</div>

<button id="final" onclick="finalMsg()">💌 Mensaje final</button>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="box" id="box"></div>
</div>

<script>

// estrellas
for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(Math.random()*4+2)+"s";
    document.body.appendChild(s);
}

// frases cursor
const frases=["mi amor ❤️","mi vida 💖","mi todo ✨","mi gordita ☁️"];

function trail(e){
    if(Math.random()>0.1)return;
    let t=document.createElement("div");
    t.className="trail";
    t.innerText=frases[Math.floor(Math.random()*frases.length)];
    t.style.left=e.pageX+"px";
    t.style.top=e.pageY+"px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2500);
}

// juego
let encontrados=0;

function openModal(text){
    encontrados++;
    document.getElementById("box").innerHTML=`
        <p>${text}</p>
        <button onclick="closeModal()">Cerrar</button>
    `;
    document.getElementById("modal").style.display="flex";

    if(encontrados>=5){
        document.getElementById("final").style.display="block";
    }
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

// final
function finalMsg(){
    document.getElementById("box").innerHTML=`
        <h2>Mi amor 💖</h2>
        <p>
        Gracias por estos meses juntos.<br><br>
        Eres mi felicidad, mi paz y mi todo.<br><br>
        Te amo infinitamente ❤️
        </p>
        <button onclick="closeModal()">Volver</button>
    `;
    document.getElementById("modal").style.display="flex";
}

</script>

</body>
</html>
