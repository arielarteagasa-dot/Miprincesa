<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita Preciosa ❤️</title>

<style>
:root{
    --pink:#ff99cc;
    --gold:#fccb90;
    --love:#ff6b81;
}

body,html{
    margin:0;
    padding:0;
    overflow:hidden;
    height:100%;
    background:#050505;
    color:white;
    font-family:sans-serif;
}

/* GALAXIA */
#nebula{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center,#1b2735,#090a0f);
    animation:move 20s infinite;
    z-index:-3;
}

@keyframes move{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* PARALLAX */
.layer{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* ESTRELLAS */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:0.7;
}

/* UI */
#ui{
    position:absolute;
    top:5%;
    width:100%;
    text-align:center;
}

h1{
    color:var(--gold);
}

/* PROGRESO */
#progress{
    width:200px;
    height:10px;
    background:#333;
    margin:10px auto;
    border-radius:10px;
}

#bar{
    height:100%;
    width:0%;
    background:var(--love);
    border-radius:10px;
}

/* FRASES */
.trail{
    position:absolute;
    font-weight:bold;
    animation:fade 2s forwards;
}

@keyframes fade{
    to{transform:translateY(-60px);opacity:0;}
}

/* OBJETOS */
.obj{
    position:absolute;
    font-size:3rem;
    cursor:pointer;
    transition:.3s;
}

.obj:hover{
    transform:scale(1.4) rotate(10deg);
}

/* BOTON FINAL */
#final{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px;
    border:none;
    border-radius:30px;
    background:var(--gold);
    font-size:1.5rem;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    max-width:320px;
    text-align:center;
}

.box img{
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body onmousemove="trail(event)" onmousemove="parallax(event)">

<div id="nebula"></div>

<div id="ui">
    <h1>Nuestra Galaxia 💖</h1>
    <div id="progress"><div id="bar"></div></div>
    <p>Encuentra los recuerdos ✨</p>
</div>

<!-- OBJETOS -->
<div class="obj" style="top:30%;left:20%" onclick="clickObj(this,'Eres mi felicidad 💖')">💖</div>
<div class="obj" style="top:60%;left:30%" onclick="clickObj(this,'Mi lugar favorito eres tú ✨')">🌟</div>
<div class="obj" style="top:40%;left:70%" onclick="clickObj(this,'Te elegiría siempre 🎁')">🎁</div>
<div class="obj" style="top:70%;left:75%" onclick="clickObj(this,'Nuestro recuerdo 📜')">📜</div>
<div class="obj" style="top:15%;left:60%" onclick="clickObj(this,'Mi tesoro 💎')">💎</div>

<button id="final" onclick="finalMsg()">💌 Mensaje final</button>

<div class="modal" id="modal">
    <div class="box" id="box"></div>
</div>

<script>

// estrellas
for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}

// FRASES
const frases=["mi amor ❤️","mi vida 💖","mi todo ✨","mi gordita ☁️"];

function trail(e){
    if(Math.random()>0.1)return;
    let t=document.createElement("div");
    t.className="trail";
    t.innerText=frases[Math.floor(Math.random()*frases.length)];
    t.style.left=e.pageX+"px";
    t.style.top=e.pageY+"px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

// PARALLAX
function parallax(e){
    let x=e.clientX/50;
    let y=e.clientY/50;
    document.getElementById("nebula").style.transform=`translate(${x}px,${y}px)`;
}

// JUEGO
let count=0;

function clickObj(el,text){
    if(el.style.opacity=="0.3")return;

    el.style.opacity="0.3";
    count++;

    document.getElementById("bar").style.width=(count*20)+"%";

    document.getElementById("box").innerHTML=`
        <p>${text}</p>
        <button onclick="closeModal()">Cerrar</button>
    `;
    document.getElementById("modal").style.display="flex";

    if(count===5){
        document.getElementById("final").style.display="block";
    }
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

// FINAL PRO
function finalMsg(){
    document.getElementById("box").innerHTML=`
        <h2>Mi amor 💖</h2>
        <img src="https://via.placeholder.com/300x200?text=TU+FOTO">
        <p>
        Gracias por cada momento juntos.<br><br>
        Eres mi paz, mi felicidad y mi todo.<br><br>
        Te amo infinitamente ❤️
        </p>
        <button onclick="closeModal()">Cerrar</button>
    `;
    document.getElementById("modal").style.display="flex";

    lluvia();
}

// LLUVIA
function lluvia(){
    setInterval(()=>{
        let e=document.createElement("div");
        e.innerText=["❤️","✨","💖","🌸"][Math.floor(Math.random()*4)];
        e.style.position="absolute";
        e.style.left=Math.random()*100+"vw";
        e.style.top="-20px";
        e.style.fontSize="20px";
        e.style.animation="fall 5s linear";
        document.body.appendChild(e);
        setTimeout(()=>e.remove(),5000);
    },200);
}

</script>

</body>
</html>
