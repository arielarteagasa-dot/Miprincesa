<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita ❤️</title>

<style>
:root{
    --pink:#ff99cc;
    --gold:#ffd700;
}

body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle,#0a0f1f,#05070d);
    color:white;
    font-family:sans-serif;
}

/* FONDO */
.star{
    position:absolute;
    width:2px;height:2px;
    background:white;
    opacity:.7;
}

/* DECORACION */
.float{
    position:absolute;
    animation:floatUp linear infinite;
}
@keyframes floatUp{
    to{transform:translateY(-120vh);}
}

/* TITULO */
#ui{
    position:absolute;
    top:5%;
    width:100%;
    text-align:center;
}

/* OBJETOS */
.obj{
    position:absolute;
    font-size:3rem;
    cursor:pointer;
    animation:floatObj 6s infinite;
}
@keyframes floatObj{
    50%{transform:translateY(-20px);}
}

/* FRASES */
.trail{
    position:absolute;
    font-weight:bold;
    animation:fade 5s forwards;
}
@keyframes fade{
    100%{transform:translateY(-80px);opacity:0;}
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
    max-width:360px;
    max-height:80vh;
    overflow:auto;
    text-align:center;
}
.box img{
    width:100%;
    border-radius:15px;
    box-shadow:0 0 20px pink;
}

/* CHAT */
.msg{
    max-width:75%;
    padding:10px;
    margin:5px;
    border-radius:12px;
}
.yo{background:#dcf8c6;align-self:flex-end;}
.ella{background:white;align-self:flex-start;}

/* BOTON */
button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:20px;
    background:var(--pink);
    color:white;
}

/* CORAZON FINAL */
.big-heart{
    position:absolute;
    font-size:100px;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    animation:boom 1s ease;
}
@keyframes boom{
    from{transform:translate(-50%,-50%) scale(0);}
    to{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body onmousemove="trail(event)">

<div id="ui">
<h1>Nuestra Galaxia 💖</h1>
<p>Encuentra todos los mensajes secretos ✨</p>
</div>

<!-- OBJETOS MÁS BONITOS -->
<div class="obj" style="top:30%;left:20%" onclick="clickObj(this,'Desde que llegaste a mi vida, todo cambió completamente, porque contigo encontré la felicidad que siempre soñé 💖')">💖</div>

<div class="obj" style="top:60%;left:30%" onclick="clickObj(this,'No importa dónde esté, mientras sea contigo, siempre será el lugar más bonito del mundo ✨')">🌟</div>

<div class="obj" style="top:40%;left:70%" onclick="clickObj(this,'Si pudiera elegir mil veces, mil veces te elegiría a ti porque eres el amor de mi vida 🎁')">🎁</div>

<div class="obj" style="top:70%;left:75%" onclick="clickObj(this,'Cada momento contigo es un recuerdo que guardo en lo más profundo de mi corazón 📜')">📜</div>

<div class="obj" style="top:15%;left:60%" onclick="clickObj(this,'Eres mi mayor tesoro, lo más valioso que tengo y lo que siempre voy a cuidar 💎')">💎</div>

<button id="final" onclick="finalMsg()" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">💌 Mensaje</button>

<div class="modal" id="modal">
<div class="box" id="box"></div>
</div>

<script>

// estrellas
for(let i=0;i<100;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.top=Math.random()*100+"vh";
 s.style.left=Math.random()*100+"vw";
 document.body.appendChild(s);
}

// decoracion
setInterval(()=>{
 let e=document.createElement("div");
 e.className="float";
 e.innerText=["❤️","✨","💖","🌸"][Math.random()*4|0];
 e.style.left=Math.random()*100+"vw";
 e.style.animationDuration=(Math.random()*5+5)+"s";
 document.body.appendChild(e);
 setTimeout(()=>e.remove(),8000);
},400);

// FRASES CURSOR
const frases=[
"mi gordita 💖",
"mi caprichosita 🎀",
"mi tiquitita ✨",
"mi amor ❤️",
"mi vida 💕",
"mi todo 💫"
];

function trail(e){
 if(Math.random()>0.03)return;
 let t=document.createElement("div");
 t.className="trail";
 t.innerText=frases[Math.random()*frases.length|0];
 t.style.left=e.pageX+"px";
 t.style.top=e.pageY+"px";
 document.body.appendChild(t);
 setTimeout(()=>t.remove(),5000);
}

// juego
let count=0;
function clickObj(el,text){
 if(el.style.opacity=="0.3")return;
 el.style.opacity="0.3";
 count++;
 showModal(`<p>${text}</p>`);
 if(count===5) final.style.display="block";
}

function showModal(content){
 box.innerHTML=content+'<br><button onclick="closeModal()">Cerrar</button>';
 modal.style.display="flex";
}

// CHAT
function mensajeSecreto(){
 box.innerHTML=`
 <h3>💬 Nuestro chat</h3>
 <div id="chat" style="display:flex;flex-direction:column;height:300px;overflow:auto;background:#e5ddd5;padding:10px;border-radius:10px;"></div>
 <button id="nextBtn" style="display:none;" onclick="mostrarCarta()">Ir al mensaje secreto 💌</button>
 `;
 modal.style.display="flex";

 const mensajes=[
  ["Hola mi amor ❤️","yo"],
  ["Hola mi vida 😘","ella"],
  ["Solo quería decirte que eres lo mejor que me ha pasado","yo"],
  ["Tú eres todo para mí 💖","ella"],
  ["Quiero estar contigo siempre","yo"],
  ["Siempre juntos mi amor ❤️","ella"]
 ];

 let i=0;
 const chat=document.getElementById("chat");

 function escribir(){
  if(i>=mensajes.length){
    nextBtn.style.display="block";
    return;
  }

  let m=document.createElement("div");
  m.className="msg "+mensajes[i][1];
  m.innerText=mensajes[i][0];
  chat.appendChild(m);
  chat.scrollTop=chat.scrollHeight;

  i++;
  setTimeout(escribir,1200);
 }

 escribir();
}

// CARTA CON FOTO
function mostrarCarta(){
 showModal(`
 <img src="foto.jpg">
 <p style="text-align:left;">
 Mi gordita hermosa<br><br>
 Ya cinco meses... (tu texto completo)
 </p>
 `);
}

// FINAL
function finalMsg(){
 showModal(`<p>Te amo infinitamente ❤️</p><button onclick="mensajeSecreto()">Ver chat</button>`);
}

// CIERRE CON EFECTO BONITO
function closeModal(){
 modal.style.display="none";

 let heart=document.createElement("div");
 heart.className="big-heart";
 heart.innerText="💖";
 document.body.appendChild(heart);

 setTimeout(()=>heart.remove(),1000);

 for(let i=0;i<30;i++){
  let e=document.createElement("div");
  e.innerText="✨";
  e.style.position="absolute";
  e.style.left=Math.random()*100+"vw";
  e.style.top="50%";
  document.body.appendChild(e);

  setTimeout(()=>{
    e.style.transform="translateY(100vh)";
  },10);

  setTimeout(()=>e.remove(),2000);
 }
}

</script>
</body>
</html>
