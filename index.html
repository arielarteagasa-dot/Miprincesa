<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita Preciosa ❤️</title>

<style>
body, html {
    margin:0; padding:0;
    width:100%; height:100%;
    overflow:hidden;
    background:#050505;
    color:white;
    font-family:sans-serif;
}

/* FONDO */
#nebula{
    position:fixed;
    width:100%; height:100%;
    background: radial-gradient(circle, #1b2735, #090a0f);
    z-index:-2;
}

/* BOTÓN INICIO */
#start{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:20px;
    background:#ff6b81;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="nebula"></div>

<div id="start">
    <h1>💖 Para Mi Gordita 💖</h1>
    <p>Haz clic para empezar ✨</p>
    <button onclick="iniciar()">Entrar 💕</button>
</div>

<!-- AUDIO QUE FUNCIONA -->
<audio id="musica" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

// partículas simples
for(let i=0;i<50;i++){
    let p=document.createElement("div");
    p.style.position="absolute";
    p.style.width="2px";
    p.style.height="2px";
    p.style.background="white";
    p.style.top=Math.random()*100+"vh";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
}

// iniciar experiencia + música
function iniciar(){
    document.getElementById("musica").play();

    document.getElementById("start").innerHTML = `
        <h1>✨ Nuestra Galaxia Mágica ✨</h1>
        <p>Te amo mucho ❤️</p>
    `;
}

</script>

</body>
</html>
