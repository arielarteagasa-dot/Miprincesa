<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita ❤️</title>

<style>
:root{
    --pink:#ff99cc;
    --gold:#ffd700;
    --bg1:#0a0f1f;
    --bg2:#05070d;
}

body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center,var(--bg1),var(--bg2));
    color:white;
    font-family:sans-serif;
}

/* FONDO */
#nebula{
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle,#1b2735,#090a0f);
    animation:move 40s linear infinite;
    z-index:-3;
}

@keyframes move{
    to{transform:translate(-25%,-25%);}
}

/* ESTRELLAS */
.star{
    position:absolute;
    width:2px;height:2px;
    background:white;
    opacity:.7;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:1;}
}

/* DECORACIÓN */
.float{
    position:absolute;
    animation:floatUp linear infinite;
    pointer-events:none;
}

@keyframes floatUp{
    to{transform:translateY(-120vh);}
}

/* TITULO */
#ui{
    position:absolute;
    top:5%;
    width:100%;
    text-align:center;
}

h1{
    color:var(--gold);
    animation:float 4s infinite;
}

@keyframes float{
    50%{transform:translateY(-10px);}
}

/* OBJETOS */
.obj{
    position:absolute;
    font-size:3rem;
    cursor:pointer;
    animation:floatObj 6s infinite;
}

@keyframes floatObj{
    50%{transform:translateY(-20px);}
}

/* FRASES */
.trail{
    position:absolute;
    animation:fade 4s forwards;
    text-shadow:0 0 10px pink;
}

@keyframes fade{
    20%{opacity:1;}
    100%{transform:translateY(-80px);opacity:0;}
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
    max-width:350px;
    max-height:80vh;
    overflow:auto;
}

/* CHAT */
.msg{
    max-width:70%;
    padding:8px;
    margin:5px;
    border-radius:10px;
    animation:msgIn .3s ease;
}

@keyframes msgIn{
    from{transform:scale(.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.yo{background:#dcf8c6;align-self:flex-end;}
.ella{background:white;align-self:flex-start;}

.typing{
    font-size:12px;
    opacity:.6;
    margin:5px;
}

/* BOTON */
button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:20px;
    background:var(--pink);
    color:white;
}

#final{
    display:none;
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    padding:20px;
    background:var(--gold);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{transform:translate(-50%,-50%) scale(1.1);}
}
</style>
</head>

<body onmousemove="trail(event)">

<div id="nebula"></div>

<div id="ui">
<h1>Nuestra Galaxia 💖</h1>
</div>

<div class="obj" style="top:30%;left:20%" onclick="clickObj(this,'Te amo demasiado 💖')">💖</div>
<div class="obj" style="top:60%;left:30%" onclick="clickObj(this,'Siempre contigo ✨')">🌟</div>
<div class="obj" style="top:40%;left:70%" onclick="clickObj(this,'Te elegiría siempre 🎁')">🎁</div>
<div class="obj" style="top:70%;left:75%" onclick="clickObj(this,'Nuestro recuerdo 📜')">📜</div>
<div class="obj" style="top:15%;left:60%" onclick="clickObj(this,'Mi todo 💎')">💎</div>

<button id="final" onclick="finalMsg()">💌 Mensaje</button>

<div class="modal" id="modal">
<div class="box" id="box"></div>
</div>

<script>

// estrellas
for(let i=0;i<120;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.top=Math.random()*100+"vh";
 s.style.left=Math.random()*100+"vw";
 document.body.appendChild(s);
}

// decoracion flotante
setInterval(()=>{
 let e=document.createElement("div");
 e.className="float";
 e.innerText=["❤️","✨","💖","🌸"][Math.random()*4|0];
 e.style.left=Math.random()*100+"vw";
 e.style.fontSize="20px";
 e.style.animationDuration=(Math.random()*5+5)+"s";
 document.body.appendChild(e);
 setTimeout(()=>e.remove(),8000);
},300);

// frases
const frases=["mi amor ❤️","mi gordita 💖","mi caprichosita 🎀","mi tiquitita ✨"];

function trail(e){
 if(Math.random()>0.05)return;
 let t=document.createElement("div");
 t.className="trail";
 t.innerText=frases[Math.random()*frases.length|0];
 t.style.left=e.pageX+"px";
 t.style.top=e.pageY+"px";
 document.body.appendChild(t);
 setTimeout(()=>t.remove(),4000);
}

// juego
let count=0;
function clickObj(el,text){
 if(el.style.opacity=="0.3")return;
 el.style.opacity="0.3";
 count++;
 showModal(text);
 if(count===5) final.style.display="block";
}

function showModal(content){
 box.innerHTML=content+'<br><button onclick="closeModal()">Cerrar</button>';
 modal.style.display="flex";
}

// CHAT REAL
function mensajeSecreto(){
 box.innerHTML=`<h3>💬 Chat</h3><div id="chat" style="display:flex;flex-direction:column;height:300px;overflow:auto;background:#e5ddd5;padding:10px;border-radius:10px;"></div>`;
 modal.style.display="flex";

 const mensajes=[
  ["Hola mi amor ❤️","yo"],
  ["Hola mi vida 😘","ella"],
  ["Te amo demasiado","yo"],
  ["Yo mucho más 💖","ella"],
  ["Eres todo para mí","yo"],
  ["Y tú mi mundo 🥺","ella"]
 ];

 let i=0;
 const chat=document.getElementById("chat");

 function escribir(){
  if(i>=mensajes.length){
    setTimeout(()=>mostrarCarta(),1000);
    return;
  }

  let typing=document.createElement("div");
  typing.className="typing";
  typing.innerText="Natasha está escribiendo...";
  chat.appendChild(typing);

  setTimeout(()=>{
    typing.remove();

    let m=document.createElement("div");
    m.className="msg "+mensajes[i][1];
    m.innerText=mensajes[i][0];
    chat.appendChild(m);
    chat.scrollTop=chat.scrollHeight;

    i++;
    escribir();
  },1000);
 }

 escribir();
}

// carta
function mostrarCarta(){
 showModal(`<h3>💖</h3><p style="text-align:left;">
 Mi gordita hermosa<br><br>
 Ya cinco meses que cumplimos desde ese 30 de octubre donde yo me tome de valor y te propuse ser mi novia, al escucharte decir que NO estaba apunto de derrumbarse mi mundo, pero al escucharte decir que SI mis ojos brillaron me puse muy feliz porque sabía que a la persona que le dijera eso sería la persona correcta, desde ese entonces ya no solo pensaba en mi si no en los dos y quiero decirte gracias por estar siempre conmigo dentro de estos 5 meses Te Amo Mucho Natasha.<br><br>
 Mi mundo entero es usted.
 </p>`);
}

// final
function finalMsg(){
 showModal(`<p>💖 Te amo 💖</p><button onclick="mensajeSecreto()">Ver chat</button>`);
}

// cierre con sorpresa
function closeModal(){
 modal.style.display="none";

 for(let i=0;i<40;i++){
  let e=document.createElement("div");
  e.innerText="💖";
  e.style.position="absolute";
  e.style.left="50%";
  e.style.top="50%";
  document.body.appendChild(e);

  setTimeout(()=>{
    e.style.transform=`translate(${Math.random()*200-100}px,${Math.random()*200-100}px)`;
    e.style.opacity=0;
  },10);

  setTimeout(()=>e.remove(),1000);
 }
}

</script>

</body>
</html>
