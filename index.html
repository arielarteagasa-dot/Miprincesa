<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita ❤️</title>

<style>
:root{
    --pink:#ff99cc;
    --gold:#ffd700;
    --bg1:#0a0f1f;
    --bg2:#05070d;
}

body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center,var(--bg1),var(--bg2));
    color:white;
    font-family:sans-serif;
}

/* GALAXIA SUAVE */
#nebula{
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle,#1b2735,#090a0f);
    animation:move 40s linear infinite;
    z-index:-3;
}

@keyframes move{
    from{transform:translate(0,0);}
    to{transform:translate(-25%,-25%);}
}

/* ESTRELLAS */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:.6;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:1;}
}

/* UI */
#ui{
    position:absolute;
    top:5%;
    width:100%;
    text-align:center;
}

h1{
    font-size:2.5rem;
    color:var(--gold);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* OBJETOS */
.obj{
    position:absolute;
    font-size:3rem;
    cursor:pointer;
    animation:floatObj 6s ease-in-out infinite;
    transition:.3s;
}

.obj:hover{
    transform:scale(1.3);
}

@keyframes floatObj{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

/* FRASES */
.trail{
    position:absolute;
    font-weight:bold;
    animation:fade 2s forwards;
    text-shadow:0 0 10px pink;
}

@keyframes fade{
    to{transform:translateY(-60px);opacity:0;}
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
    max-width:320px;
    text-align:center;
    animation:pop .4s ease;
}

@keyframes pop{
    from{transform:scale(.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

/* FOTO */
.box img{
    width:100%;
    border-radius:15px;
    box-shadow:0 0 20px pink;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 10px pink;}
    to{box-shadow:0 0 25px gold;}
}

/* BOTON FINAL */
#final{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 40px;
    border:none;
    border-radius:30px;
    background:var(--gold);
    font-size:1.5rem;
    cursor:pointer;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
}

</style>
</head>

<body onmousemove="trail(event)">

<div id="nebula"></div>

<div id="ui">
    <h1>Nuestra Galaxia 💖</h1>
    <p>Encuentra los recuerdos ✨</p>
</div>

<!-- OBJETOS -->
<div class="obj" style="top:30%;left:20%" onclick="clickObj(this,'Eres mi felicidad 💖')">💖</div>
<div class="obj" style="top:60%;left:30%" onclick="clickObj(this,'Mi lugar favorito eres tú ✨')">🌟</div>
<div class="obj" style="top:40%;left:70%" onclick="clickObj(this,'Te elegiría siempre 🎁')">🎁</div>
<div class="obj" style="top:70%;left:75%" onclick="clickObj(this,'Nuestro recuerdo 📜')">📜</div>
<div class="obj" style="top:15%;left:60%" onclick="clickObj(this,'Mi tesoro 💎')">💎</div>

<button id="final" onclick="finalMsg()">💌 Mensaje final</button>

<div class="modal" id="modal">
    <div class="box" id="box"></div>
</div>

<script>

// estrellas suaves
for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}

// FRASES
const frases=["mi amor ❤️","mi vida 💖","mi todo ✨","mi gordita ☁️"];

function trail(e){
    if(Math.random()>0.08)return;
    let t=document.createElement("div");
    t.className="trail";
    t.innerText=frases[Math.floor(Math.random()*frases.length)];
    t.style.left=e.pageX+"px";
    t.style.top=e.pageY+"px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

// JUEGO
let count=0;

function clickObj(el,text){
    if(el.style.opacity=="0.3")return;

    el.style.opacity="0.3";
    count++;

    showModal(`<p>${text}</p>`);

    if(count===5){
        document.getElementById("final").style.display="block";
    }
}

function showModal(content){
    document.getElementById("box").innerHTML = content + `<br><button onclick="closeModal()">Cerrar</button>`;
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

// FINAL
function finalMsg(){
    showModal(`
        <h2>Mi amor 💖</h2>
        <img src="foto.jpg">
        <p>
        Gracias por cada momento contigo.<br><br>
        Eres mi felicidad, mi paz y mi todo.<br><br>
        Te amo infinitamente ❤️
        </p>
    `);

    lluvia();
}

// LLUVIA SUAVE
function lluvia(){
    setInterval(()=>{
        let e=document.createElement("div");
        e.innerText=["❤️","✨","💖","🌸"][Math.floor(Math.random()*4)];
        e.style.position="absolute";
        e.style.left=Math.random()*100+"vw";
        e.style.top="-20px";
        e.style.fontSize="20px";
        e.style.opacity=0.8;
        e.style.transition="transform 5s linear";
        document.body.appendChild(e);

        setTimeout(()=>{
            e.style.transform="translateY(110vh)";
        },10);

        setTimeout(()=>e.remove(),5000);
    },300);
}

</script>

</body>
</html>
