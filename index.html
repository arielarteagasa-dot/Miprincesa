<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle,#0a0f1f,#05070d);
    color:white;
    font-family:sans-serif;
}

/* estrellas */
.star{
    position:absolute;
    width:2px;height:2px;
    background:white;
}

/* objetos */
.obj{
    position:absolute;
    font-size:3rem;
    cursor:pointer;
}

/* frases */
.trail{
    position:absolute;
    font-weight:bold;
    animation:fade 4s forwards;
}
@keyframes fade{
    to{transform:translateY(-80px);opacity:0;}
}

/* modal */
.modal{
    display:none;
    position:fixed;
    width:100%;height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
    max-width:350px;
    max-height:80vh;
    overflow:auto;
    text-align:center;
}
.box img{
    width:100%;
    border-radius:10px;
}

/* chat */
.msg{
    padding:8px;
    margin:5px;
    border-radius:10px;
}
.yo{background:#dcf8c6;}
.ella{background:#fff;}
</style>
</head>

<body onmousemove="trail(event)">

<h2 style="text-align:center;margin-top:20px;">Nuestra Galaxia 💖</h2>

<!-- objetos -->
<div class="obj" style="top:30%;left:20%" onclick="clickObj(this,'Eres lo mejor que me ha pasado 💖')">💖</div>
<div class="obj" style="top:60%;left:30%" onclick="clickObj(this,'Siempre contigo ✨')">🌟</div>
<div class="obj" style="top:40%;left:70%" onclick="clickObj(this,'Te elegiría mil veces 🎁')">🎁</div>
<div class="obj" style="top:70%;left:75%" onclick="clickObj(this,'Nuestro recuerdo 📜')">📜</div>
<div class="obj" style="top:15%;left:60%" onclick="clickObj(this,'Mi todo 💎')">💎</div>

<button id="final" onclick="finalMsg()" style="display:none;position:absolute;top:50%;left:50%">💌 Mensaje</button>

<div class="modal" id="modal">
<div class="box" id="box"></div>
</div>

<script>

// estrellas
for(let i=0;i<80;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.top=Math.random()*100+"vh";
 s.style.left=Math.random()*100+"vw";
 document.body.appendChild(s);
}

// frases cursor
const frases=["mi gordita 💖","mi caprichosita 🎀","mi tiquitita ✨","mi amor ❤️"];

function trail(e){
 if(Math.random()>0.03)return;
 let t=document.createElement("div");
 t.className="trail";
 t.innerText=frases[Math.random()*frases.length|0];
 t.style.left=e.pageX+"px";
 t.style.top=e.pageY+"px";
 document.body.appendChild(t);
 setTimeout(()=>t.remove(),4000);
}

// juego
let count=0;
function clickObj(el,text){
 if(el.style.opacity=="0.3")return;
 el.style.opacity="0.3";
 count++;
 showModal("<p>"+text+"</p>");
 if(count===5) document.getElementById("final").style.display="block";
}

function showModal(content){
 document.getElementById("box").innerHTML=content+'<br><button onclick="closeModal()">Cerrar</button>';
 document.getElementById("modal").style.display="flex";
}

// chat
function mensajeSecreto(){
 let box=document.getElementById("box");

 box.innerHTML=`
 <h3>💬 Nuestro chat</h3>
 <div id="chat" style="height:250px;overflow:auto;background:#e5ddd5;padding:10px;border-radius:10px;"></div>
 <button onclick="mostrarCarta()">Ir al mensaje secreto 💌</button>
 `;

 document.getElementById("modal").style.display="flex";

 let mensajes=[
  ["Hola mi amor ❤️","yo"],
  ["Hola mi vida 😘","ella"],
  ["Te amo mucho","yo"],
  ["Yo más 💖","ella"],
  ["Eres todo para mí","yo"],
  ["Siempre juntos 🥺","ella"]
 ];

 let i=0;
 let chat=document.getElementById("chat");

 function escribir(){
  if(i>=mensajes.length)return;

  let m=document.createElement("div");
  m.className="msg "+mensajes[i][1];
  m.innerText=mensajes[i][0];
  chat.appendChild(m);
  chat.scrollTop=chat.scrollHeight;

  i++;
  setTimeout(escribir,1000);
 }

 escribir();
}

// carta FINAL CON TU TEXTO
function mostrarCarta(){
 showModal(`
 <img src="foto.jpg">
 <p style="text-align:left;">
 Mi gordita hermosa<br><br>
 Ya cinco meses que cumplimos desde ese 30 de octubre donde yo me tome de valor y te propuse ser mi novia, al escucharte decir que NO estaba apunto de derrumbarse mi mundo, pero al escucharte decir que SI mis ojos brillaron me puse muy feliz porque sabía que a la persona que le dijera eso sería la persona correcta, desde ese entonces ya no solo pensaba en mi si no en los dos y quiero decirte gracias por estar siempre conmigo dentro de estos 5 meses Te Amo Mucho Natasha.<br><br>
 Mi mundo entero es usted.
 </p>
 `);
}

// final
function finalMsg(){
 showModal('<p>Te amo ❤️</p><button onclick="mensajeSecreto()">Ver chat</button>');
}

// cerrar con animación
function closeModal(){
 document.getElementById("modal").style.display="none";

 let h=document.createElement("div");
 h.innerText="💖";
 h.style.position="absolute";
 h.style.fontSize="80px";
 h.style.top="50%";
 h.style.left="50%";
 document.body.appendChild(h);

 setTimeout(()=>h.remove(),1000);
}

</script>
</body>
</html>
