<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita ❤️</title>

<style>
:root{
    --pink:#ff99cc;
    --gold:#ffd700;
    --bg1:#0a0f1f;
    --bg2:#05070d;
}

body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center,var(--bg1),var(--bg2));
    color:white;
    font-family:sans-serif;
}

/* GALAXIA */
#nebula{
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle,#1b2735,#090a0f);
    animation:move 40s linear infinite;
    z-index:-3;
}

@keyframes move{
    from{transform:translate(0,0);}
    to{transform:translate(-25%,-25%);}
}

/* ESTRELLAS */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    opacity:.6;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;}
    to{opacity:1;}
}

/* UI */
#ui{
    position:absolute;
    top:5%;
    width:100%;
    text-align:center;
}

h1{
    font-size:2.5rem;
    color:var(--gold);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* OBJETOS */
.obj{
    position:absolute;
    font-size:3rem;
    cursor:pointer;
    animation:floatObj 6s ease-in-out infinite;
    transition:.3s;
}

.obj:hover{
    transform:scale(1.3);
}

@keyframes floatObj{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

/* FRASES */
.trail{
    position:absolute;
    font-weight:bold;
    animation:fade 3.5s forwards;
    text-shadow:0 0 10px pink;
}

@keyframes fade{
    0%{opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-80px);opacity:0;}
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
    max-width:350px;
    max-height:80vh;
    overflow-y:auto;
    text-align:center;
    animation:pop .4s ease;
}

@keyframes pop{
    from{transform:scale(.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

/* FOTO */
.box img{
    width:100%;
    border-radius:15px;
    box-shadow:0 0 20px pink;
}

/* BOTONES */
button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:var(--pink);
    color:white;
    cursor:pointer;
}

/* FINAL */
#final{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 40px;
    border:none;
    border-radius:30px;
    background:var(--gold);
    font-size:1.5rem;
    cursor:pointer;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
}

</style>
</head>

<body onmousemove="trail(event)">

<div id="nebula"></div>

<div id="ui">
    <h1>Nuestra Galaxia 💖</h1>
    <p>Encuentra los recuerdos ✨</p>
</div>

<!-- OBJETOS -->
<div class="obj" style="top:30%;left:20%" onclick="clickObj(this,'Desde que llegaste a mi vida, todo tiene más sentido y más felicidad 💖')">💖</div>
<div class="obj" style="top:60%;left:30%" onclick="clickObj(this,'No importa dónde esté, mientras sea contigo, siempre será mi lugar favorito ✨')">🌟</div>
<div class="obj" style="top:40%;left:70%" onclick="clickObj(this,'Si tuviera que elegir mil veces, mil veces te elegiría a ti sin dudarlo 🎁')">🎁</div>
<div class="obj" style="top:70%;left:75%" onclick="clickObj(this,'Cada recuerdo contigo es un tesoro que guardo en lo más profundo de mi corazón 📜')">📜</div>
<div class="obj" style="top:15%;left:60%" onclick="clickObj(this,'Eres lo más valioso que tengo en mi vida y siempre voy a cuidarte 💎')">💎</div>

<button id="final" onclick="finalMsg()">💌 Mensaje final</button>

<div class="modal" id="modal">
    <div class="box" id="box"></div>
</div>

<script>

// estrellas
for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}

// FRASES
const frases=[
"mi amor ❤️",
"mi gordita 💖",
"mi caprichosita 🎀",
"mi tiquitita ✨",
"mi mujer 💍"
];

function trail(e){
    if(Math.random()>0.04)return;
    let t=document.createElement("div");
    t.className="trail";
    t.innerText=frases[Math.floor(Math.random()*frases.length)];
    t.style.left=e.pageX+"px";
    t.style.top=e.pageY+"px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3500);
}

// JUEGO
let count=0;

function clickObj(el,text){
    if(el.style.opacity=="0.3")return;
    el.style.opacity="0.3";
    count++;
    showModal(`<p>${text}</p>`);

    if(count===5){
        document.getElementById("final").style.display="block";
    }
}

function showModal(content){
    document.getElementById("box").innerHTML = content + `<br><button onclick="closeModal()">Cerrar</button>`;
    document.getElementById("modal").style.display="flex";
}

// CHAT + MENSAJE
function mensajeSecreto(){
    document.getElementById("box").innerHTML = `
        <h2>💬 Nuestro chat</h2>
        <div id="chat" style="background:#e5ddd5;padding:10px;border-radius:10px;height:300px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;"></div>
        <br>
        <button id="continuarBtn" style="display:none;" onclick="mostrarCarta()">Continuar 💖</button>
    `;
    document.getElementById("modal").style.display="flex";

    const mensajes=[
        {text:"Hola mi amor ❤️",tipo:"yo"},
        {text:"Hola mi vida 😘",tipo:"ella"},
        {text:"Te amo mucho",tipo:"yo"},
        {text:"Yo más 💖",tipo:"ella"},
        {text:"Eres mi todo",tipo:"yo"},
        {text:"Y tú el mío 🥺",tipo:"ella"}
    ];

    let i=0;
    const chat=document.getElementById("chat");

    function agregar(){
        if(i>=mensajes.length){
            document.getElementById("continuarBtn").style.display="block";
            return;
        }

        let m=document.createElement("div");
        m.innerText=mensajes[i].text;
        m.style.maxWidth="70%";
        m.style.margin="5px";
        m.style.padding="8px";
        m.style.borderRadius="10px";

        if(mensajes[i].tipo=="yo"){
            m.style.alignSelf="flex-end";
            m.style.background="#dcf8c6";
        }else{
            m.style.alignSelf="flex-start";
            m.style.background="white";
        }

        chat.appendChild(m);
        chat.scrollTop=chat.scrollHeight;

        i++;
        setTimeout(agregar,1200);
    }

    agregar();
}

// CARTA
function mostrarCarta(){
    showModal(`
        <h2>Para ti mi amor 💖</h2>
        <p style="text-align:left;">
        Mi gordita hermosa<br><br>

        Ya cinco meses que cumplimos desde ese 30 de octubre donde yo me tome de valor y te propuse ser mi novia, al escucharte decir que NO estaba apunto de derrumbarse mi mundo, pero al escucharte decir que SI mis ojos brillaron me puse muy feliz porque sabía que a la persona que le dijera eso sería la persona correcta, desde ese entonces ya no solo pensaba en mi si no en los dos y quiero decirte gracias por estar siempre conmigo dentro de estos 5 meses Te Amo Mucho Natasha.<br><br>

        Mi mundo entero es usted.
        </p>
    `);
}

// FINAL
function finalMsg(){
    showModal(`
        <h2>Mi amor 💖</h2>
        <img src="foto.jpg">
        <p>Te amo infinitamente ❤️</p>
        <button onclick="mensajeSecreto()">💌 Ver chat</button>
    `);
}

// EFECTO SORPRESA
function closeModal(){
    document.getElementById("modal").style.display="none";

    for(let i=0;i<30;i++){
        let e=document.createElement("div");
        e.innerText="💖";
        e.style.position="absolute";
        e.style.left="50%";
        e.style.top="50%";
        e.style.transition="all 1s ease-out";
        document.body.appendChild(e);

        setTimeout(()=>{
            e.style.left=Math.random()*100+"vw";
            e.style.top=Math.random()*100+"vh";
            e.style.opacity=0;
        },10);

        setTimeout(()=>e.remove(),1000);
    }
}

</script>

</body>
</html>
